<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Markdown Cleaner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Reef JS v13 -->
  <script src="https://cdn.jsdelivr.net/npm/reefjs@13/dist/reef.min.js"></script>

  <style>
    :root {
      --bg: #0f172a;
      --panel: #020617;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --success: #22c55e;
      --border: #1e293b;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
    }

    #app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      height: 100%;
      resize: none;
      background: var(--panel);
      color: var(--text);
      border: none;
      padding: 1rem;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: .9rem;
      line-height: 1.5;
      outline: none;
    }

    footer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .75rem;
      align-items: center;
      padding: .5rem 1rem;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .actions {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }

    button {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      padding: .35rem .6rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: .8rem;
    }

    button:hover {
      border-color: var(--accent);
    }

    button:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .status {
      font-size: .8rem;
      color: var(--success);
      min-height: 1em;
      text-align: right;
    }

    .muted { color: var(--muted); }
  </style>
</head>

<body>
  <main id="app"></main>

  <script type="module">
    const { signal, component } = reef;

    /* =========================
       STORE
       ========================= */
    const data = signal({
      initialMarkdown: '',
      currentMarkdown: '',
      hasInitial: false,
      feedback: ''
    });

    /* =========================
       PURE TRANSFORMS
       ========================= */
    const transforms = {
      inc(text) {
        return text.replace(/^(#{1,6})\s+/gm, (_, h) =>
          '#'.repeat(Math.min(h.length + 1, 6)) + ' '
        );
      },
      dec(text) {
        return text.replace(/^(#{1,6})\s+/gm, (_, h) =>
          h.length === 1 ? '# ' : '#'.repeat(h.length - 1) + ' '
        );
      },
      quotes(text) {
        return text.replace(/^>\s?/gm, '');
      }
    };

    async function copy(text) {
      await navigator.clipboard.writeText(text);
    }

    /* =========================
       ACTIONS
       ========================= */
    const actions = {
      input(value) {
        data.currentMarkdown = value;
        data.feedback = '';
      },

      paste(value) {
        data.initialMarkdown = value;
        data.currentMarkdown = value;
        data.hasInitial = true;
        data.feedback = '';
      },

      async transform(type) {
        const fn = transforms[type];
        if (!fn) return;

        const next = fn(data.currentMarkdown);
        data.currentMarkdown = next;

        try {
          await copy(next);
          data.feedback = 'Copié ✓';
        } catch {
          data.feedback = 'Erreur de copie';
        }
      },

      reset() {
        if (!data.hasInitial) return;
        data.currentMarkdown = data.initialMarkdown;
        data.feedback = '';
      }
    };

    /* =========================
       EVENTS
       ========================= */
    document.addEventListener('click', e => {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      actions[el.dataset.action]?.(el.dataset.type);
    });

    document.addEventListener('input', e => {
      if (e.target.matches('textarea')) {
        actions.input(e.target.value);
      }
    });

    document.addEventListener('paste', e => {
      if (e.target.matches('textarea')) {
        requestAnimationFrame(() => {
          actions.paste(e.target.value);
        });
      }
    });

    /* =========================
       TEMPLATE
       ========================= */
    function template() {
      return `
        <header>
          <h1>Markdown Cleaner</h1>
        </header>

        <textarea
          aria-label="Markdown source"
          value="${data.currentMarkdown}"
        ></textarea>

        <footer>
          <div class="actions">
            <button data-action="transform" data-type="inc">+ Titre</button>
            <button data-action="transform" data-type="dec">− Titre</button>
            <button data-action="transform" data-type="quotes">Supprimer &gt;</button>
            <button data-action="reset" ${!data.hasInitial ? 'disabled' : ''}>
              Annuler
            </button>
          </div>

          <div class="status" aria-live="polite">
            ${data.feedback || '<span class="muted"></span>'}
          </div>
        </footer>
      `;
    }

    component('#app', template);
  </script>
</body>
</html>
